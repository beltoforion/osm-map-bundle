<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>3D-Hoehenmodell - 1. Lichtloch (DGM1 / DOM1)</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; font-family: sans-serif; background: #0b1020; }
    #c { display: block; width: 100%; height: 100%; }
    #panel {
      position: absolute; top: 10px; left: 10px; z-index: 1;
      background: rgba(255,255,255,0.92); padding: 10px 14px; border-radius: 6px;
      font-size: 13px; line-height: 1.6; max-width: 320px;
    }
    #panel h3 { margin: 0 0 4px; font-size: 14px; }
    #panel label { cursor: pointer; }
    #hint { font-size: 11px; color: #555; }
    #loading { position: absolute; inset: 0; display: flex; align-items: center;
      justify-content: center; color: #cdd; font-size: 16px; z-index: 2; }
  </style>
</head>
<body>
  <div id="panel">
    <h3>3D-Hoehenmodell &ndash; 1. Lichtloch</h3>
    Rothschoenberger Stolln &middot; 1&times;1&nbsp;km<br>
    Modell:
    <label><input type="radio" name="m" value="dgm1" checked> DGM1 (Gelaende)</label>
    <label><input type="radio" name="m" value="dom1"> DOM1 (Oberflaeche)</label><br>
    Ueberhoehung: <input id="exag" type="range" min="1" max="5" step="0.5" value="2"> <span id="exagv">2&times;</span><br>
    <span id="hint">Ziehen = drehen &middot; Rad = zoomen &middot; Rechtsklick = verschieben<br>
    Lizenz: dl-de/by-2-0, Geodaten Sachsen</span>
  </div>
  <div id="loading">Lade Hoehendaten &hellip;</div>
  <canvas id="c"></canvas>

  <script type="importmap">
  { "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }}
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const DATA = './lichtloch3d/';

    // --- Hilfsfunktion: hypsometrische Einfaerbung nach Hoehe (gruen->braun->weiss) ---
    const stops = [
      [0.00, new THREE.Color(0x2e7d32)],
      [0.45, new THREE.Color(0x9e9d24)],
      [0.75, new THREE.Color(0x8d6e63)],
      [1.00, new THREE.Color(0xf5f5f5)],
    ];
    function hypso(t) {
      for (let i = 1; i < stops.length; i++) {
        if (t <= stops[i][0]) {
          const a = stops[i-1], b = stops[i];
          const f = (t - a[0]) / (b[0] - a[0]);
          return a[1].clone().lerp(b[1], f);
        }
      }
      return stops[stops.length-1][1];
    }

    async function loadBin(name) {
      const buf = await (await fetch(DATA + name)).arrayBuffer();
      return new Float32Array(buf);
    }

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0b1020);

    const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));

    const camera = new THREE.PerspectiveCamera(50, 1, 1, 20000);
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    scene.add(new THREE.AmbientLight(0xffffff, 0.55));
    const sun = new THREE.DirectionalLight(0xffffff, 2.0);
    sun.position.set(-1, 1.3, -1);   // Licht aus NW (wie die Schummerung)
    scene.add(sun);

    function resize() {
      const w = innerWidth, h = innerHeight;
      renderer.setSize(w, h); camera.aspect = w / h; camera.updateProjectionMatrix();
    }
    addEventListener('resize', resize);

    let meta, elev = {}, meshes = {}, marker, current = 'dgm1', exag = 2;
    let globalMin, globalMax;

    function buildMesh(product) {
      const g = meta.grid, size = meta.sizeMeters, e = elev[product];
      const geo = new THREE.PlaneGeometry(size, size, g - 1, g - 1);
      const pos = geo.attributes.position;
      const col = new Float32Array(pos.count * 3);
      const span = globalMax - globalMin || 1;
      for (let k = 0; k < pos.count; k++) {
        const z = e[k];
        pos.setZ(k, (z - globalMin) * exag);          // Hoehe (vor Rotation lokal +Z)
        const c = hypso((z - globalMin) / span);
        col[3*k] = c.r; col[3*k+1] = c.g; col[3*k+2] = c.b;
      }
      geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
      geo.rotateX(-Math.PI / 2);                       // hinlegen: Hoehe -> Welt +Y
      geo.computeVertexNormals();
      const mat = new THREE.MeshStandardMaterial({ vertexColors: true, roughness: 1, metalness: 0 });
      return new THREE.Mesh(geo, mat);
    }

    function rebuild() {
      for (const p of ['dgm1','dom1']) {
        if (meshes[p]) { scene.remove(meshes[p]); meshes[p].geometry.dispose(); meshes[p].material.dispose(); }
        meshes[p] = buildMesh(p);
        meshes[p].visible = (p === current);
        scene.add(meshes[p]);
      }
      // Marker (Pin) in der Mitte = 1. Lichtloch, auf Hoehe der aktuellen Oberflaeche
      const g = meta.grid;
      const cz = elev[current][(g/2) * g + (g/2)];
      const top = (cz - globalMin) * exag;
      if (marker) scene.remove(marker);
      marker = new THREE.Group();
      const stick = new THREE.Mesh(
        new THREE.CylinderGeometry(2, 2, 60, 12),
        new THREE.MeshStandardMaterial({ color: 0xd32f2f }));
      stick.position.set(0, top + 30, 0);
      const head = new THREE.Mesh(
        new THREE.SphereGeometry(10, 16, 16),
        new THREE.MeshStandardMaterial({ color: 0xd32f2f, emissive: 0x550000 }));
      head.position.set(0, top + 65, 0);
      marker.add(stick); marker.add(head);
      scene.add(marker);
    }

    (async function init() {
      meta = await (await fetch(DATA + 'meta.json')).json();
      elev.dgm1 = await loadBin('dgm1.bin');
      elev.dom1 = await loadBin('dom1.bin');
      globalMin = Math.min(meta.products.dgm1.min, meta.products.dom1.min);
      globalMax = Math.max(meta.products.dgm1.max, meta.products.dom1.max);

      rebuild();
      resize();
      const s = meta.sizeMeters;
      controls.target.set(0, (globalMax - globalMin) * exag * 0.5, 0);
      camera.position.set(s * 0.7, s * 0.6, s * 0.7);
      document.getElementById('loading').remove();
      animate();
    })();

    document.querySelectorAll('input[name=m]').forEach(r => r.onchange = () => {
      current = document.querySelector('input[name=m]:checked').value;
      meshes.dgm1.visible = current === 'dgm1';
      meshes.dom1.visible = current === 'dom1';
      rebuild();
    });
    const exagEl = document.getElementById('exag');
    exagEl.oninput = () => {
      exag = parseFloat(exagEl.value);
      document.getElementById('exagv').textContent = exag + '×';
      rebuild();
    };

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
