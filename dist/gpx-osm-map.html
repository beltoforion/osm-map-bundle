<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <link rel="stylesheet" href="ol.css" />
  <title>OSM maps</title>
  <style>
    .map-wrap { position: relative; height: 750px; width: 750px; }
    .map-wrap #map { height: 100%; width: 100%; }
    #info {
      position: absolute; top: 8px; left: 8px; z-index: 1;
      background: rgba(255,255,255,0.9); padding: 6px 10px; border-radius: 4px;
      font-family: sans-serif; font-size: 12px; line-height: 1.5;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }
    #info .ver { color: #555; }
    #info .coords { font-family: monospace; }
    #info button {
      margin-left: 6px; font-size: 11px; padding: 1px 6px; cursor: pointer;
    }
  </style>
</head>
<body>

<div class="map-wrap">
  <div id="map" class="map"></div>
  <!-- Optionales Info-Panel: rein deklarativ ueber data-osm-* Attribute.
       Markup, Platzierung und Styling bestimmt der Client; map.bindInfoControls()
       verdrahtet das Verhalten. Wird dieser Block weggelassen, gibt es kein Panel. -->
  <div id="info">
    <div class="ver">osm-map-bundle v<span data-osm-version></span></div>
    <div>Mitte: <span data-osm-coords class="coords">-</span>
      <button data-osm-copy type="button">Kopieren</button></div>
  </div>
</div>

<script src="./osm-map-bundle.js"></script>
<script>
    const map = new OsmMap.OsmMap('map');
    // Auf die Freiberger Altstadt zentrieren - innerhalb der vorhandenen lidar_tiles.
    // Tiles reichen von z13 bis nativ z18; z19 ist Over-Zoom.
    map.setView([50.921500, 13.343000], 13, 19, 15);  // [lat, lon], zoom min/max/initial
//  map.addTileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png');
    map.addTileLayer('./lidar_tiles/{z}/{x}/{y}.webp', 18);  // 2. Param = hoechste native Kachel-Zoomstufe
    map.setLabelMinZoom(15);  // POI-Textlabels erst ab z15 anzeigen (einstellbar)

    var jsonStyles = {
      'Canal' : new OsmMap.LineStyle('#0000FF', 3),
      'Marker' : new OsmMap.AnnotatedPointStyle('#fff','#000', 8, 1),
      'PointMarker' : new OsmMap.AnnotatedPointStyle('#ff0', '#000', 20, 1),
      'Mine' : new OsmMap.IconStyle('./assets/pin_grube.png', [0.5, 1], '#000', '#fff', 1, 0.2),
    };
    
    var jsonData = {
      "type": "FeatureCollection",
      "crs": { "type": "name", "properties": { "name": "urn:ogc:def:crs:OGC:1.3:CRS84" } },
                                        
      "features": [
        {
          "type": "Feature",
          "properties": {
            "name": "Beispiellinie",
            "type": "Canal",
          },
          "geometry": {
            "type": "LineString",
            "coordinates": [
              [ 13.3406, 50.9182],
              [ 13.3447, 50.9203],
              [ 13.3554, 50.9277] ]
          }
        },
        {
          "type": "Feature",
          "properties": {
            "name": "Reiche Zeche",
            "type": "Mine",
            "url":  "https://beltoforion.de"
           },
          "geometry": {
            "type": "Point",
            "coordinates": [  13.3554,  50.9277 ]
          }
        },
        {
          "type": "Feature",
          "properties": {
            "name": "Freiberg",
            "type": "PointMarker"
           },
          "geometry": {
            "type": "Point",
            "coordinates": [  13.3406,  50.9195 ]
          }
        },
        {
          "type": "Feature",
          "properties": {
            "name": "Freiberger Dom",
            "type": "Marker"
          },
          "geometry": {
            "type": "Point",
            "coordinates": [  13.3414,  50.9182 ]
          }
        },
        {
          "type": "Feature",
          "properties": {
            "name": "Schloss Freudenstein",
            "type": "Marker"
          },
          "geometry": {
            "type": "Point",
            "coordinates": [  13.3375,  50.9203 ]
          }
        },
        {
          "type": "Feature",
          "properties": {
            "name": "TU Bergakademie",
            "type": "Marker"
          },
          "geometry": {
            "type": "Point",
            "coordinates": [  13.3360,  50.9215 ]
          }
        },
        {
          "type": "Feature",
          "properties": {
            "name": "Petriturm",
            "type": "Marker"
          },
          "geometry": {
            "type": "Point",
            "coordinates": [  13.3447,  50.9203 ]
          }
        },
      ]
    };
    map.addJsonLayer(jsonData, jsonStyles);

    // Verdrahtet das optionale Info-Panel (data-osm-version / -coords / -copy).
    // Weglassen = diese Zeile + das #info-Markup entfernen.
    map.bindInfoControls();

    // Optional: auf das 'osm:copy'-Event reagieren, um kurz Feedback zu zeigen.
    document.querySelector('[data-osm-copy]').addEventListener('osm:copy', (e) => {
      const btn = e.currentTarget;
      const old = btn.textContent;
      btn.textContent = e.detail.ok ? 'Kopiert!' : 'Fehler';
      setTimeout(() => { btn.textContent = old; }, 1200);
    });
</script>

</body>
</html>
